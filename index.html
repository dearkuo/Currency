<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>匯率轉換器</title>
    <style>
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: url('https://images.unsplash.com/photo-1543966888-7c1dc482a810?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 35px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 { text-align: center; color: #4a6fa5; margin-bottom: 25px; font-weight: 600; }

        label { display: block; margin: 15px 0 8px; font-size: 0.95em; color: #636e72; }

        select, input {
            width: 100%;
            padding: 12px;
            border: 2px solid #dfe6e9;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 16px;
            color: #2d3436;
            transition: 0.3s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #74b9ff;
            background-color: #fcfdfe;
        }

        /* 匯率資訊區塊 */
        .rate-box {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            font-size: 0.85em;
            color: #636e72;
            text-align: center;
        }

        .rate-item { flex: 1; }
        .rate-value { display: block; font-weight: bold; color: #0984e3; margin-top: 4px; }

        .result { 
            font-size: 1.6em; 
            font-weight: 700; 
            text-align: center; 
            color: #2d3436; 
            margin-top: 25px;
            padding: 20px;
            background: #eef2f7;
            border-radius: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>匯率轉換器</h2>
    
    <label>選擇外幣幣別</label>
    <select id="currency" onchange="convert()">
        <option value="32.5">美元 (USD)</option>
        <option value="0.21">日圓 (JPY)</option>
        <option value="0.023">韓元 (KRW)</option>
        <option value="4.4">人民幣 (CNY)</option>
    </select>
    
    <div class="rate-box">
        <div class="rate-item">
            1 外幣 = <span class="rate-value" id="rateToTwd">32.5 TWD</span>
        </div>
        <div class="rate-item">
            1 台幣 = <span class="rate-value" id="rateToForeign">0.03 USD</span>
        </div>
    </div>

    <label>輸入外幣金額</label>
    <input type="number" id="amount" placeholder="請輸入金額..." oninput="convert()">

    <div class="result" id="result">0.00 TWD</div>
</div>

<script>
    function convert() {
        const amount = document.getElementById('amount').value;
        const selectElement = document.getElementById('currency');
        const rate = parseFloat(selectElement.value);
        
        // 計算反向匯率 (1 / 匯率)
        const inverseRate = (1 / rate).toFixed(4);
        
        const resultDiv = document.getElementById('result');
        const rateToTwd = document.getElementById('rateToTwd');
        const rateToForeign = document.getElementById('rateToForeign');

        // 更新顯示文字
        rateToTwd.innerText = `${rate} TWD`;
        rateToForeign.innerText = `${inverseRate}`;

        // 計算轉換結果
        if (amount === "" || amount < 0) {
            resultDiv.innerText = "0.00 TWD";
        } else {
            const total = (amount * rate).toLocaleString(undefined, {
                minimumFractionDigits: 2, 
                maximumFractionDigits: 2
            });
            resultDiv.innerText = `${total} TWD`;
        }
    }

    // 初始化執行
    convert();
</script>

</body>
</html>
